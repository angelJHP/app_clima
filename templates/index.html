<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu clima hoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="video-background-body">
    <div class="video-background-wrapper">
        <video autoplay muted loop playsinline class="background-video">
            <source src="{{ url_for('static', filename='videos/tierra.mp4') }}" type="video/mp4">
        </video>
    </div>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="weather-container p-4 bg-white rounded shadow-sm w-100">
            <div class="weather-header text-center mb-4">
                <h1>Aplicación del Clima</h1>
            </div>
            <form action="/weather" method="post" class="mb-4">
                <div class="mb-3">
                    <label for="city" class="form-label">Ciudad:</label>
                    <input type="text" class="form-control" id="city" name="city" required oninvalid="this.setCustomValidity('Por favor ingresa el nombre la ciudad: ')"
                    oninput="this.setCustomValidity('')">   
                </div>
                    <button type="submit" class="btn btn-primary w-100">Obtener Clima</button>
            </form>
            {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }} 
                </div>
            {% endif %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
